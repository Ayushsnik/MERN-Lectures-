<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="./login.css">

<body>
    
<div class="pura">
    <h2>Sign-up</h2>
    <form  class="form" action="#" method="post">
        <div class="group">
            <label for="name">Name</label>
            <input id="name" type="text" name="name" placeholder="Enter your Name" required>
        </div>
           <div class="group">
                 <label for="Username">Username</label>
                 <input id="Username" type="text" name="Username"  required placeholder="Enter Username">
           </div>
           <div class="group">
                 <label for="password">Password</label>
                 <input id="password" type="password" name="password" required placeholder="Enter password">
           </div>
      <div class="group">
                 <label for="confirm">Confirm password</label>
                 <input id="confirm" type="password" name="confirm"  required placeholder="Enter password again">
           </div>
           <div class="group">
            <label for="email">email</label>
            <input id="Username" type="email" name="email"  required placeholder="Enter email">
      </div>
           <button type="submit " class="btn">
              Submit
           </button>
           <h2 style="size:10px ; color: grey; "> already have an account?<a style="color: rgb(32, 32, 240);" href="./login.html">login in</a></h2>
           

    </form>     
</div>

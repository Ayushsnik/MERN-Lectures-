<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .pura {
            border: 5px solid black;
            margin: 50px;
						gap : 5px;
            width: 600px;
            height: 600px;
            background-color: black;
            display: grid;
            grid-template-columns: repeat(14,1fr);
            grid-template-rows: repeat(14,1fr);
        }
        .blue
        {
            background-color: blue;
        }
        .yellow
        {
            background-color: yellow;
        }
        .white
        {
            background-color: white;
        }
        .red 
        {
            background-color: red;
        }
        #b1
        {
            grid-column:1/5 ;
            grid-row: 1/3;
        }
        #w1
        {
            grid-column: 5/11;
            grid-row: 1/3;
        }
        #bl1
        {
            grid-column: 11/13;
            grid-row: 1/3;
        }
        #w2
        {
            grid-column: 13/15;
            grid-row: 1/3;
        }
        #w3
        {
            grid-column: 1/3;
            grid-row: 3/7;
        }
        #r1
        {
            grid-column:3/11 ;
            grid-row: 3/11;
        }
        #y1
        {
            grid-column:1/3  ;
            grid-row:12/15 ;
        }
        #w4
        {
            grid-column: 1/3;
            grid-row: 7/12;
        }
        #w5
        {
            grid-column: 6/11;
            grid-row: 11/13;
        }
        #y2
        {
            grid-column:11/15 ;
            grid-row:3/6 ;
        }
        #w6
        {
            grid-column: 11/13;
            grid-row: 6/13;
        }
        #w7
        {
            grid-row: 6/13;
            grid-column: 13/span 2;

        }
        #w
        {
            grid-row:13/15;
            grid-column: 6/11;
        }
        #b2
        {
            grid-column: 11/15;
            grid-row: 13/15;
        }
        #w8
        {
            grid-column: 3/6;
            grid-row: 14/span 1;
        }
        #bl2
        {
            grid-area: 11/14/span 3/ span 3;
        }

    </style>
</head>
<body>
    <div class="pura">

        <div class="blue" id="b1"></div>
        <div class="white" id="w1"></div>
        <div class="black" id="bl1"></div>
        <div class="white" id="w2"></div>
        <div class="white" id="w3"></div>
        <div class="red" id="r1"></div>
        <div class="yellow" id="y1"></div>
        <div class="white" id="w4"></div>
        <div class="white" id="w5"></div>
        <div class="yellow" id="y2"></div>
        <div class="black" id="bl2"></div>
        <div class="white" id="w6"></div>
        <div class="white" id="w7"></div>
        <div class="white" id="w8"></div>
        <div class="blue" id="b2"></div>
        <div class="white" id="w7"></div>
        <div class="white" id="w8"></div>

    </div>
    
</body>
</html>
